<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Azershal Japanese — Business Fluency in 6 Months</title>
<meta name="theme-color" content="#10131a" id="mt">
<meta name="description" content="SRS flashcards, keigo, grammar & a 26-week business-Japanese curriculum. Works offline.">
<link rel="manifest" href="manifest-v13.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles-v13.css">
</head>
<body>
<div id="app">
  <!-- TOP BAR (mobile only) -->
  <header class="topbar">
    <div class="tb-brand">
      <div class="logo">ア</div>
      <div>Azershal JP<small>Business fluency · 6 months</small></div>
    </div>
    <button class="toggle-btn" id="furiToggleTop" title="Toggle furigana">あ</button>
    <button class="toggle-btn" id="themeToggleTop" title="Toggle theme">🌙</button>
  </header>

  <!-- SIDEBAR (desktop) / BOTTOM NAV (mobile) -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">ア</div>
      <div>
        <div class="brand-title">Azershal JP</div>
        <div class="brand-sub">Business fluency · 6 mo</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-btn" data-route="daily">🗓️ Daily</button>
      <button class="nav-btn active" data-route="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-route="curriculum">📅 Curriculum</button>
      <button class="nav-btn" data-route="review">🔁 Review <span class="badge zero" id="dueBadge">0</span></button>
      <button class="nav-btn" data-route="flashcards">🎴 Cards</button>
      <button class="nav-btn" data-route="word">⭐ Word</button>
      <button class="nav-btn" data-route="kana">あ Kana</button>
      <button class="nav-btn" data-route="grammar">📐 Grammar</button>
      <button class="nav-btn" data-route="keigo">🙇 Keigo</button>
      <button class="nav-btn" data-route="quiz">✏️ Quiz</button>
      <button class="nav-btn" data-route="mywords">➕ My Words</button>
      <button class="nav-btn" data-route="app">📱 App</button>
      <button class="nav-btn" data-route="export">📦 Export</button>
      <button class="nav-btn" data-route="progress">📈 Progress</button>
    </nav>
    <div class="sidebar-foot">
      <div class="streak-box">
        <div>🔥 Streak: <b id="streakNum">0</b> days</div>
        <div>🎴 Known: <b id="knownNum">0</b> / <span id="totalNum">0</span></div>
      </div>
      <div class="toggle-row">
        <button class="toggle-btn" id="furiToggleSide">あ Furigana</button>
        <button class="toggle-btn" id="themeToggleSide">🌙 Dark</button>
      </div>
    </div>
  </aside>

  <main class="content" id="content"></main>
</div>

<script src="data-v13.js"></script>
<script src="kanji-meanings-v13.js"></script>
<script src="furigana-v13.js"></script>
<script src="app-v13.js"></script>
</body>
</html>
